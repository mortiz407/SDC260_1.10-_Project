<!DOCTYPE html>

<!-- set languge to english -->
<html lang="en">

    <!--Create a head section-->
    <head>

        <!--Using utf-8 characters-->
        <meta charset="utf-8" />

        <!--Description of the page-->
        <meta name="description" content="My Webpage" />

        <!--Keywords in the page-->
        <meta name="keywords" content="about, projects, contact" />

        <!--Author name-->
        <meta name="author" content="Manuel Ortiz" />

        <!--Page to fit all screens-->
        <meta name="viewpoint" content="width=device-width, initial-scale=1.0" />

        <!--Title-->
        <title>My Webpage</title>
    </head>

    <!--Create a body section-->
    <body>
        <header>
            <!--Welcoming people to my page-->
            <h1>Welcome to my Webpage test</h1>

            <!--navigation menu with a bulleted list-->
            <nav>
                <ul>
                    <li><a href="#about">About</a></li>
                    <li><a href="#projects">Projects</a></li>
                    <li><a href="#contact">Contact</a></li>
                </ul>
            </nav>
        </header>

        <!--Main section with three sections inside-->
        <main>

            <!--About section-->
            <section id="about">
                <h2>About</h2>
                <p>This is the About scetion.</p>
            </section>

            <!--Projects section-->
            <section id="projects">
                <h2>Projects</h2>
                <p>This is the Projects section.</p>
            </section>

            <!--Contact section-->
            <section>
                <h2>Contact</h2>
                <p>This is the Contact section.</p>
            </section>
        </main>

        <!--Creating a footer-->
        <footer>

            <!--creating a dividing line-->
            <hr>
            <p>Copyright &copy;&mdash; 2026 Manuel Ortiz &mdash; All right reserved.</p>
        </footer>
    </body>
</html>
